      correlated attempts or a rubber-stamp verifier void the guarantee.
      Verification/routing literature: REF-114-class experimentation
      discipline and the process-supervision line (Lightman et al.). Seeded
      from model knowledge; verified by deterministic computation at evidence
      time.
    reproduce: "python3 theorems/evidence_verifier_math.py theorems/verifier_math.py"

  - id: THM-VOTE-002
    statement: >
      Condorcet amplification instance: for p > 1/2, the majority of n
      independent voters is at least as reliable as one voter and strictly
      improves as n grows — verified in exact arithmetic for all odd n <= 15
      and five p values (40 checks); and for p < 1/2 the majority DEGRADES
      below the single voter in all 35 converse checks.
    evidence_level: machine_checked
    artifact:
      - "artifacts/verifier_math.json"
    metrics:
      amplification_checks: 40
      degradation_checks: 35
      max_n: 15
    caveat: >
      Self-consistency voting amplifies only what is already better than
      chance — below 1/2 it makes things worse, which is why voting never
      substitutes for verification. Bounded exhaustive instance of the
      classical jury theorem; independence is a model assumption. Seeded from
      model knowledge; verified by deterministic computation at evidence time.
    reproduce: "python3 theorems/evidence_verifier_math.py theorems/verifier_math.py"

  - id: THM-ROUTE-001
    statement: >
      Verifier-gated cascade dominance: routing each item to a big model
      exactly when a perfect verifier rejects the small model's answer never
      yields more errors than running the big model alone — verified over
      every (small,big)-correctness table for up to 8 items (87380 exhaustive
      tables); and the expected-cost identity cost = c_small +
      defer_rate*c_big matches literal enumeration in all 2046 defer sets up
      to 10 items.
    evidence_level: machine_checked
    artifact:
      - "artifacts/verifier_math.json"
    metrics:
      dominance_tables_checked: 87380
      cost_identity_checks: 2046
    caveat: >
      The routing contract behind FrugalGPT-style cascades and TrustGate-style
      gates: with a PERFECT verifier the cascade is never worse than the big
      model and usually far cheaper. Real verifiers are imperfect — their
      false-accept rate is exactly the term a deployment must measure
      (conformal risk control, CLAIM-011/THM-CONF-004-class machinery) before
      trusting the dominance. The reusable implementation ships in this
      bundle's code/ (verifier_math.py). Seeded from model knowledge; verified
      by deterministic computation at evidence time.
    reproduce: "python3 theorems/evidence_verifier_math.py theorems/verifier_math.py"

  - id: THM-SCORE-001
    statement: >
